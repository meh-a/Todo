<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>todo</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #141414;
      --surface: #1e1e1e;
      --border: #2c2c2c;
      --text: #d4d4d0;
      --muted: #555;
      --muted2: #3a3a3a;
      --danger: #a04040;
      --accent: #5a8a5a;
      --radius: 5px;
      --font: 'Instrument Sans', sans-serif;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.5; }
    #app { min-height: 100vh; display: flex; flex-direction: column; }

    header { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; }
    .logo { font-size: 13px; font-weight: 500; color: var(--muted); }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .user-tag { font-size: 12px; color: var(--muted); }
    .btn-signout { background: none; border: none; font-family: var(--font); font-size: 12px; color: var(--muted); cursor: pointer; padding: 0; }
    .btn-signout:hover { color: var(--text); }
    .rt-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted2); transition: background 0.4s; }
    .rt-dot.live { background: #4a7a4a; }

    main { flex: 1; max-width: 520px; width: 100%; margin: 0 auto; padding: 40px 24px 80px; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── AUTH ───────────────────────────────────── */
    .auth-hint { font-size: 12px; color: var(--muted); margin-bottom: 18px; }
    .auth-row { display: flex; gap: 8px; }
    .auth-row input { flex: 1; }

    /* ── TODOS TOP ──────────────────────────────── */
    .todos-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .todos-top h2 { font-size: 12px; font-weight: 500; color: var(--muted); }
    .done-count { font-size: 12px; color: var(--muted); }

    /* ── INPUTS ─────────────────────────────────── */
    input[type="text"] {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-family: var(--font); font-size: 13px; padding: 8px 11px;
      outline: none; width: 100%; transition: border-color 0.15s;
    }
    input:focus { border-color: #444; }
    input::placeholder { color: var(--muted); }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: var(--surface); color: var(--text); border: 1px solid var(--border);
      border-radius: var(--radius); font-family: var(--font); font-size: 13px;
      padding: 8px 14px; cursor: pointer; transition: border-color 0.15s, color 0.15s; white-space: nowrap;
    }
    .btn:hover { border-color: #444; color: #e8e8e4; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-inline {
      background: none; border: none; font-family: var(--font); font-size: 11px;
      color: var(--muted); cursor: pointer; padding: 1px 4px; border-radius: 3px;
      transition: color 0.12s; white-space: nowrap;
    }
    .btn-inline:hover { color: var(--text); }

    .btn-danger {
      background: none; border: none; color: var(--muted2); font-family: var(--font);
      font-size: 12px; cursor: pointer; padding: 2px 5px; border-radius: 3px;
      transition: color 0.15s; width: auto; line-height: 1;
    }
    .btn-danger:hover { color: var(--danger); }

    /* ── FILTERS ────────────────────────────────── */
    .filters { display: flex; gap: 2px; margin-bottom: 14px; }
    .filter-btn {
      background: none; border: none; color: var(--muted); font-family: var(--font);
      font-size: 12px; padding: 3px 9px; border-radius: 3px; cursor: pointer; transition: all 0.12s;
    }
    .filter-btn.active { background: var(--muted2); color: var(--text); }
    .filter-btn:hover:not(.active) { color: var(--text); }

    /* ── ADD TASK FORM ──────────────────────────── */
    .add-form { display: flex; gap: 8px; margin-bottom: 18px; }
    .add-form input { flex: 1; }

    /* ── TASK GROUP ─────────────────────────────── */
    .task-group { border-bottom: 1px solid var(--border); }
    .task-group:last-child { border-bottom: none; }

    /* ── PARENT TASK ROW ────────────────────────── */
    .parent-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 2px 9px 0;
      transition: opacity 0.15s;
    }
    .parent-row.all-done { opacity: 0.35; }

    /* collapse toggle */
    .collapse-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      padding: 0; width: 14px; flex-shrink: 0; font-size: 10px; line-height: 1;
      transition: color 0.12s; display: flex; align-items: center; justify-content: center;
    }
    .collapse-btn:hover { color: var(--text); }
    .collapse-btn svg { transition: transform 0.15s; }
    .collapse-btn.collapsed svg { transform: rotate(-90deg); }

    /* progress ring / fraction */
    .progress-wrap {
      flex-shrink: 0; display: flex; align-items: center; gap: 6px;
    }
    .progress-ring { display: block; flex-shrink: 0; }
    .progress-ring-bg { fill: none; stroke: var(--border); stroke-width: 2; }
    .progress-ring-fill { fill: none; stroke: var(--accent); stroke-width: 2; stroke-linecap: round; transition: stroke-dashoffset 0.3s ease; }
    .progress-pct { font-size: 11px; color: var(--muted); min-width: 28px; }

    .parent-title {
      flex: 1; font-size: 13px; font-weight: 500; color: var(--text);
      cursor: default;
    }
    .parent-row.all-done .parent-title { text-decoration: line-through; }

    .parent-actions { display: flex; align-items: center; gap: 2px; opacity: 0; transition: opacity 0.12s; }
    .parent-row:hover .parent-actions { opacity: 1; }

    /* ── SUBTASK SECTION ────────────────────────── */
    .subtask-section { padding-left: 24px; overflow: hidden; }
    .subtask-section.collapsed { display: none; }

    .subtask-row {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 2px; border-top: 1px solid var(--border);
      transition: opacity 0.15s;
    }
    .subtask-row.done { opacity: 0.32; }
    .subtask-row.done .subtask-text { text-decoration: line-through; }
    .subtask-text { flex: 1; font-size: 12px; color: var(--text); }

    .subtask-actions { display: flex; align-items: center; gap: 2px; opacity: 0; transition: opacity 0.12s; }
    .subtask-row:hover .subtask-actions { opacity: 1; }

    /* inline add subtask */
    .add-subtask-row {
      display: flex; gap: 6px; padding: 6px 2px; border-top: 1px solid var(--border);
    }
    .add-subtask-row input { flex: 1; font-size: 12px; padding: 5px 9px; }
    .add-subtask-row .btn { font-size: 12px; padding: 5px 10px; }
    .add-subtask-trigger {
      display: flex; padding: 5px 2px; border-top: 1px solid var(--border);
    }

    /* ── CHECKBOX ───────────────────────────────── */
    .check-wrap { flex-shrink: 0; width: 15px; height: 15px; position: relative; cursor: pointer; }
    .check-wrap input[type="checkbox"] { opacity: 0; position: absolute; inset: 0; cursor: pointer; margin: 0; }
    .check-box {
      width: 15px; height: 15px; border: 1px solid var(--border); border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.12s; pointer-events: none;
    }
    .check-wrap:hover .check-box { border-color: #555; }
    .check-wrap input:checked ~ .check-box { background: #3a3a3a; border-color: #555; }
    .check-icon { display: none; width: 8px; height: 6px; }
    .check-icon path { stroke: var(--text); stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .check-wrap input:checked ~ .check-box .check-icon { display: block; }

    /* ── MISC ───────────────────────────────────── */
    .empty-state { padding: 36px 0; font-size: 12px; color: var(--muted); }
    .message { padding: 8px 11px; border-radius: var(--radius); font-size: 12px; margin-bottom: 12px; display: none; }
    .message.error   { background: #2a1a1a; border: 1px solid #4a2a2a; color: #a07070; display: block; }
    .message.success { background: #1a2a1a; border: 1px solid #2a4a2a; color: #70a070; display: block; }
    .spinner { width: 13px; height: 13px; border: 1.5px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.3s; }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loading-logo { font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>

<div id="loading-overlay"><div class="loading-logo">todo</div></div>

<div id="app">
  <header>
    <div class="logo">todo</div>
    <div class="header-right">
      <div class="rt-dot" id="rt-dot"></div>
      <span class="user-tag" id="user-tag" style="display:none"></span>
      <button class="btn-signout" id="logout-btn" style="display:none">sign out</button>
    </div>
  </header>

  <main>
    <!-- AUTH -->
    <div id="auth-screen" class="screen">
      <p class="auth-hint">enter a username to continue</p>
      <div id="auth-msg" class="message"></div>
      <div class="auth-row">
        <input type="text" id="username-input" placeholder="username" maxlength="30"
               autocomplete="off" autocapitalize="none" spellcheck="false" />
        <button class="btn" id="enter-btn">enter</button>
      </div>
    </div>

    <!-- TODOS -->
    <div id="todos-screen" class="screen">
      <div class="todos-top">
        <h2>tasks</h2>
        <span class="done-count" id="done-count-wrap" style="display:none">
          <span id="done-count">0</span> done
        </span>
      </div>
      <div class="add-form">
        <input type="text" id="new-todo" placeholder="new task…" maxlength="200" />
        <button class="btn" id="add-btn">add</button>
      </div>
      <div class="filters">
        <button class="filter-btn active" data-filter="all">all</button>
        <button class="filter-btn" data-filter="active">active</button>
        <button class="filter-btn" data-filter="done">done</button>
      </div>
      <div id="todos-msg" class="message"></div>
      <div class="todo-list" id="todo-list">
        <div class="empty-state">loading…</div>
      </div>
    </div>
  </main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = 'https://abrtmsqhglebnvnnqsgz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_k5Q359IfraiIVDZ4AQlAvQ_2YSD4wBY';
const SALT = 'todo-friends-xK9m';

let sb, currentUser, currentUsername;
let todos = [];          // all rows flat
let activeFilter = 'all';
let rtChannel;
let collapsedIds = {};   // track which parent tasks are collapsed
let addingSubtaskFor = null; // parent id currently showing inline add

// ── BOOT ─────────────────────────────────────────────────
window.addEventListener('load', function () {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  sb.auth.onAuthStateChange(function (_e, session) {
    if (session && session.user) {
      currentUser = session.user;
      currentUsername = usernameFromEmail(session.user.email);
      showTodosScreen(currentUsername);
    } else {
      currentUser = null; currentUsername = null;
      if (rtChannel) { sb.removeChannel(rtChannel); rtChannel = null; }
      document.getElementById('user-tag').style.display = 'none';
      document.getElementById('logout-btn').style.display = 'none';
      showScreen('auth-screen');
    }
  });

  sb.auth.getSession().then(function (res) {
    var session = res.data && res.data.session;
    if (session && session.user) {
      currentUser = session.user;
      currentUsername = usernameFromEmail(session.user.email);
      showTodosScreen(currentUsername);
    } else {
      showScreen('auth-screen');
    }
    hideOverlay();
  }).catch(function (e) {
    hideOverlay(); showScreen('auth-screen');
    showMsg('auth-msg', 'connection error: ' + e.message, 'error');
  });
});

function usernameToEmail(u) { return u.toLowerCase().replace(/[^a-z0-9_\-]/g, '') + '@todo.local'; }
function usernameFromEmail(e) { return e.replace('@todo.local', ''); }
function usernameToPassword(u) { return u.toLowerCase() + '_' + SALT; }

// ── AUTH ─────────────────────────────────────────────────
document.getElementById('enter-btn').addEventListener('click', handleEnter);
document.getElementById('username-input').addEventListener('keydown', function (e) {
  if (e.key === 'Enter') handleEnter();
});

async function handleEnter() {
  var raw = document.getElementById('username-input').value.trim();
  var username = raw.toLowerCase().replace(/[^a-z0-9_\-]/g, '');
  if (!username) { showMsg('auth-msg', 'pick a username', 'error'); return; }
  document.getElementById('username-input').value = username;

  var email = usernameToEmail(username);
  var password = usernameToPassword(username);
  setLoading('enter-btn', true, 'enter');

  var res = await sb.auth.signInWithPassword({ email: email, password: password });
  if (res.error) {
    if (res.error.message.toLowerCase().includes('invalid')) {
      var su = await sb.auth.signUp({ email: email, password: password });
      if (su.error) { setLoading('enter-btn', false, 'enter'); showMsg('auth-msg', su.error.message, 'error'); return; }
      var res2 = await sb.auth.signInWithPassword({ email: email, password: password });
      if (res2.error) { setLoading('enter-btn', false, 'enter'); showMsg('auth-msg', res2.error.message, 'error'); return; }
    } else {
      setLoading('enter-btn', false, 'enter'); showMsg('auth-msg', res.error.message, 'error'); return;
    }
  }
  setLoading('enter-btn', false, 'enter');
}

document.getElementById('logout-btn').addEventListener('click', function () { sb.auth.signOut(); });

// ── SCREENS ───────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function (s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function showTodosScreen(username) {
  document.getElementById('user-tag').textContent = username;
  document.getElementById('user-tag').style.display = '';
  document.getElementById('logout-btn').style.display = '';
  showScreen('todos-screen');
  loadTodos();
  subscribeRealtime();
}

function hideOverlay() {
  var ov = document.getElementById('loading-overlay');
  ov.classList.add('hidden');
  setTimeout(function () { if (ov.parentNode) ov.parentNode.removeChild(ov); }, 400);
}

// ── LOAD ──────────────────────────────────────────────────
async function loadTodos() {
  var res = await sb.from('todos').select('*')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: true });
  if (res.error) { showMsg('todos-msg', res.error.message, 'error'); return; }
  todos = res.data || [];
  renderTodos();
}

// ── ADD PARENT TASK ───────────────────────────────────────
document.getElementById('add-btn').addEventListener('click', addTask);
document.getElementById('new-todo').addEventListener('keydown', function (e) { if (e.key === 'Enter') addTask(); });

async function addTask() {
  var input = document.getElementById('new-todo');
  var title = input.value.trim();
  if (!title) return;
  input.value = '';

  // Optimistic: add a temp row immediately
  var tempId = 'temp-' + Date.now();
  var tempRow = { id: tempId, title: title, user_id: currentUser.id, is_complete: false, parent_id: null, created_at: new Date().toISOString() };
  todos.push(tempRow);
  renderTodos();

  var res = await sb.from('todos').insert({ title: title, user_id: currentUser.id, is_complete: false, parent_id: null }).select().single();
  if (res.error) {
    // Revert
    todos = todos.filter(function (t) { return t.id !== tempId; });
    renderTodos();
    input.value = title;
    showMsg('todos-msg', res.error.message, 'error');
  } else {
    // Swap temp row for real one (realtime may already have done this)
    todos = todos.map(function (t) { return t.id === tempId ? res.data : t; });
    renderTodos();
  }
}

// ── ADD SUBTASK ───────────────────────────────────────────
function showSubtaskInput(parentId) {
  addingSubtaskFor = parentId;
  renderTodos();
  setTimeout(function () {
    var inp = document.getElementById('subtask-input-' + parentId);
    if (inp) inp.focus();
  }, 20);
}

function hideSubtaskInput() {
  addingSubtaskFor = null;
  renderTodos();
}

async function commitSubtask(parentId) {
  var inp = document.getElementById('subtask-input-' + parentId);
  if (!inp) return;
  var title = inp.value.trim();
  if (!title) { hideSubtaskInput(); return; }
  inp.value = '';
  addingSubtaskFor = null;

  // Optimistic: add a temp subtask row immediately
  var tempId = 'temp-' + Date.now();
  var tempRow = { id: tempId, title: title, user_id: currentUser.id, is_complete: false, parent_id: parentId, created_at: new Date().toISOString() };
  todos.push(tempRow);
  renderTodos();

  var res = await sb.from('todos').insert({ title: title, user_id: currentUser.id, is_complete: false, parent_id: parentId }).select().single();
  if (res.error) {
    todos = todos.filter(function (t) { return t.id !== tempId; });
    renderTodos();
    showMsg('todos-msg', res.error.message, 'error');
  } else {
    todos = todos.map(function (t) { return t.id === tempId ? res.data : t; });
    renderTodos();
  }
}

// ── TOGGLE / DELETE ───────────────────────────────────────
async function toggleTodo(id, current) {
  var next = !current;

  // Optimistic: flip locally right away
  todos = todos.map(function (t) { return t.id === id ? Object.assign({}, t, { is_complete: next }) : t; });
  renderTodos();

  var res = await sb.from('todos').update({ is_complete: next }).eq('id', id);
  if (res.error) {
    // Revert
    todos = todos.map(function (t) { return t.id === id ? Object.assign({}, t, { is_complete: current }) : t; });
    renderTodos();
    showMsg('todos-msg', res.error.message, 'error');
  }
}

async function deleteTodo(id) {
  // Optimistic: remove locally (children too, mirroring ON DELETE CASCADE)
  var removed = todos.filter(function (t) { return t.id === id || t.parent_id === id; });
  todos = todos.filter(function (t) { return t.id !== id && t.parent_id !== id; });
  renderTodos();

  var res = await sb.from('todos').delete().eq('id', id);
  if (res.error) {
    // Revert — put removed rows back
    todos = todos.concat(removed);
    renderTodos();
    showMsg('todos-msg', res.error.message, 'error');
  }
}

function toggleCollapse(parentId) {
  collapsedIds[parentId] = !collapsedIds[parentId];
  renderTodos();
}

// ── REALTIME ──────────────────────────────────────────────
function subscribeRealtime() {
  if (rtChannel) sb.removeChannel(rtChannel);
  setRt(false);
  rtChannel = sb.channel('todos-rt')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'todos', filter: 'user_id=eq.' + currentUser.id }, function (payload) {
      if (payload.eventType === 'INSERT')      todos.push(payload.new);
      else if (payload.eventType === 'UPDATE') todos = todos.map(function (t) { return t.id === payload.new.id ? payload.new : t; });
      else if (payload.eventType === 'DELETE') todos = todos.filter(function (t) { return t.id !== payload.old.id; });
      renderTodos();
    })
    .subscribe(function (status) { setRt(status === 'SUBSCRIBED'); });
}

function setRt(live) {
  document.getElementById('rt-dot').className = 'rt-dot' + (live ? ' live' : '');
}

// ── FILTERS ───────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(function (btn) {
  btn.addEventListener('click', function () {
    document.querySelectorAll('.filter-btn').forEach(function (b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderTodos();
  });
});

// ── RENDER ────────────────────────────────────────────────
function renderTodos() {
  clearMsg('todos-msg');

  // Separate parents and children
  var parents  = todos.filter(function (t) { return !t.parent_id; });
  var children = todos.filter(function (t) { return  t.parent_id; });

  // Build map: parentId -> subtasks[]
  var subtaskMap = {};
  children.forEach(function (c) {
    if (!subtaskMap[c.parent_id]) subtaskMap[c.parent_id] = [];
    subtaskMap[c.parent_id].push(c);
  });

  // Compute done count (top-level tasks fully done)
  var doneParents = parents.filter(function (p) {
    var subs = subtaskMap[p.id] || [];
    return subs.length === 0 ? p.is_complete : subs.every(function (s) { return s.is_complete; });
  }).length;
  document.getElementById('done-count').textContent = doneParents;
  document.getElementById('done-count-wrap').style.display = doneParents > 0 ? '' : 'none';

  // Filter parents
  var filtered = parents;
  if (activeFilter === 'active') {
    filtered = parents.filter(function (p) {
      var subs = subtaskMap[p.id] || [];
      return subs.length === 0 ? !p.is_complete : !subs.every(function (s) { return s.is_complete; });
    });
  } else if (activeFilter === 'done') {
    filtered = parents.filter(function (p) {
      var subs = subtaskMap[p.id] || [];
      return subs.length === 0 ? p.is_complete : subs.every(function (s) { return s.is_complete; });
    });
  }

  var list = document.getElementById('todo-list');

  if (filtered.length === 0) {
    var msgs = { all: 'nothing here yet', active: 'all clear', done: 'nothing done yet' };
    list.innerHTML = '<div class="empty-state">' + (msgs[activeFilter] || '') + '</div>';
    return;
  }

  list.innerHTML = filtered.map(function (parent) {
    var subs = (subtaskMap[parent.id] || []).slice().sort(function (a, b) {
      return new Date(a.created_at) - new Date(b.created_at);
    });
    var total = subs.length;
    var done  = subs.filter(function (s) { return s.is_complete; }).length;
    var allDone = total > 0 ? done === total : parent.is_complete;
    var collapsed = collapsedIds[parent.id];

    // Progress ring (only shown when subtasks exist)
    var progressHTML = '';
    if (total > 0) {
      var pct = Math.round((done / total) * 100);
      var r = 7, circ = 2 * Math.PI * r;
      var offset = circ - (done / total) * circ;
      progressHTML = '<div class="progress-wrap">'
        + '<svg class="progress-ring" width="18" height="18" viewBox="0 0 18 18">'
        + '<circle class="progress-ring-bg" cx="9" cy="9" r="' + r + '"/>'
        + '<circle class="progress-ring-fill" cx="9" cy="9" r="' + r + '"'
        + ' stroke-dasharray="' + circ.toFixed(2) + '"'
        + ' stroke-dashoffset="' + offset.toFixed(2) + '"'
        + ' transform="rotate(-90 9 9)"/>'
        + '</svg>'
        + '<span class="progress-pct">' + pct + '%</span>'
        + '</div>';
    } else {
      // No subtasks — show a plain checkbox
      progressHTML = '<label class="check-wrap">'
        + '<input type="checkbox" ' + (parent.is_complete ? 'checked' : '')
        + ' onchange="toggleTodo(\'' + parent.id + '\',' + parent.is_complete + ')">'
        + '<div class="check-box"><svg class="check-icon" viewBox="0 0 10 7"><path d="M1 3.5L4 6.5L9 1"/></svg></div>'
        + '</label>';
    }

    // Collapse arrow (only shown when subtasks exist)
    var collapseHTML = total > 0
      ? '<button class="collapse-btn' + (collapsed ? ' collapsed' : '') + '" onclick="toggleCollapse(\'' + parent.id + '\')">'
        + '<svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>'
        + '</button>'
      : '<span style="width:14px;flex-shrink:0;display:inline-block"></span>';

    // Subtask rows
    var subtaskRows = subs.map(function (sub) {
      return '<div class="subtask-row' + (sub.is_complete ? ' done' : '') + '">'
        + '<label class="check-wrap">'
        + '<input type="checkbox" ' + (sub.is_complete ? 'checked' : '')
        + ' onchange="toggleTodo(\'' + sub.id + '\',' + sub.is_complete + ')">'
        + '<div class="check-box"><svg class="check-icon" viewBox="0 0 10 7"><path d="M1 3.5L4 6.5L9 1"/></svg></div>'
        + '</label>'
        + '<span class="subtask-text">' + esc(sub.title) + '</span>'
        + '<div class="subtask-actions">'
        + '<button class="btn-danger" onclick="deleteTodo(\'' + sub.id + '\')">✕</button>'
        + '</div>'
        + '</div>';
    }).join('');

    // Inline subtask add row
    var addSubtaskHTML = '';
    if (addingSubtaskFor === parent.id) {
      addSubtaskHTML = '<div class="add-subtask-row">'
        + '<input type="text" id="subtask-input-' + parent.id + '" placeholder="subtask…" maxlength="200"'
        + ' onkeydown="if(event.key===\'Enter\')commitSubtask(\'' + parent.id + '\');if(event.key===\'Escape\')hideSubtaskInput()">'
        + '<button class="btn" onclick="commitSubtask(\'' + parent.id + '\')">add</button>'
        + '<button class="btn" onclick="hideSubtaskInput()">✕</button>'
        + '</div>';
    } else {
      addSubtaskHTML = '<div class="add-subtask-trigger">'
        + '<button class="btn-inline" onclick="showSubtaskInput(\'' + parent.id + '\')">+ subtask</button>'
        + '</div>';
    }

    return '<div class="task-group">'
      + '<div class="parent-row' + (allDone ? ' all-done' : '') + '">'
      + collapseHTML
      + progressHTML
      + '<span class="parent-title">' + esc(parent.title) + '</span>'
      + '<div class="parent-actions">'
      + '<button class="btn-danger" onclick="deleteTodo(\'' + parent.id + '\')">✕</button>'
      + '</div>'
      + '</div>'
      + '<div class="subtask-section' + (collapsed ? ' collapsed' : '') + '">'
      + subtaskRows
      + addSubtaskHTML
      + '</div>'
      + '</div>';
  }).join('');
}

// ── HELPERS ───────────────────────────────────────────────
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showMsg(id, text, type) { var el = document.getElementById(id); el.textContent = text; el.className = 'message ' + type; }
function clearMsg(id) { document.getElementById(id).className = 'message'; }
function setLoading(id, loading, label) { var btn = document.getElementById(id); btn.disabled = loading; btn.innerHTML = loading ? '<span class="spinner"></span>' : label; }
</script>
</body>
</html>
