<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doable — Multi-user To-Do</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0d0d0d; --surface:#161616; --border:#2a2a2a; --accent:#c8f04a;
      --text:#f0f0ee; --muted:#666; --danger:#ff4d4d; --radius:6px;
      --font-head:'Syne',sans-serif; --font-mono:'DM Mono',monospace;
    }
    html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--font-mono); font-size:14px; line-height:1.6; }
    #app { min-height:100vh; display:flex; flex-direction:column; }

    header { display:flex; align-items:center; justify-content:space-between; padding:20px 32px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg); z-index:10; }
    .logo { font-family:var(--font-head); font-size:22px; font-weight:800; letter-spacing:-0.5px; }
    .logo span { color:var(--accent); }
    .header-right { display:flex; align-items:center; gap:14px; font-size:12px; color:var(--muted); }
    .user-tag { background:var(--surface); border:1px solid var(--border); padding:4px 12px; border-radius:99px; color:var(--text); }

    main { flex:1; max-width:640px; width:100%; margin:0 auto; padding:48px 24px 80px; }

    .screen { display:none; animation:fadeUp 0.25s ease both; }
    .screen.active { display:block; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

    .auth-header { margin-bottom:48px; }
    .auth-header h1 { font-family:var(--font-head); font-size:42px; font-weight:800; letter-spacing:-1.5px; line-height:1.1; margin-bottom:12px; }
    .auth-header h1 em { font-style:normal; color:var(--accent); }
    .auth-header p { color:var(--muted); }
    .auth-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:32px; }
    .tabs { display:flex; margin-bottom:28px; border-bottom:1px solid var(--border); }
    .tab-btn { background:none; border:none; color:var(--muted); font-family:var(--font-head); font-size:14px; font-weight:600; padding:10px 20px 12px; cursor:pointer; position:relative; transition:color 0.2s; }
    .tab-btn.active { color:var(--text); }
    .tab-btn.active::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:2px; background:var(--accent); }

    .form-group { display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
    label { font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); }
    input[type="text"],input[type="email"],input[type="password"] { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-family:var(--font-mono); font-size:14px; padding:10px 14px; outline:none; width:100%; transition:border-color 0.15s; }
    input:focus { border-color:var(--accent); }
    input::placeholder { color:var(--muted); }

    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; background:var(--accent); color:#0d0d0d; border:none; border-radius:var(--radius); font-family:var(--font-head); font-size:14px; font-weight:700; padding:11px 20px; cursor:pointer; transition:background 0.15s,transform 0.1s; width:100%; letter-spacing:0.02em; }
    .btn:hover { background:#d4f55c; }
    .btn:active { transform:scale(0.98); }
    .btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
    .btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); font-family:var(--font-mono); font-weight:400; font-size:12px; }
    .btn-ghost:hover { background:var(--surface); color:var(--text); }
    .btn-danger { background:transparent; border:none; color:var(--muted); font-family:var(--font-mono); font-size:11px; cursor:pointer; padding:4px 6px; border-radius:4px; transition:color 0.15s,background 0.15s; width:auto; }
    .btn-danger:hover { color:var(--danger); background:rgba(255,77,77,0.08); }

    .todos-header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:32px; }
    .todos-header h2 { font-family:var(--font-head); font-size:32px; font-weight:800; letter-spacing:-1px; line-height:1.1; }
    .todos-header h2 small { display:block; font-size:12px; font-weight:400; color:var(--muted); font-family:var(--font-mono); letter-spacing:0; margin-bottom:4px; }
    .stats { text-align:right; font-size:11px; color:var(--muted); }
    .stats strong { display:block; font-family:var(--font-head); font-size:28px; font-weight:800; color:var(--accent); line-height:1; }

    .add-form { display:flex; gap:10px; margin-bottom:28px; }
    .add-form input { flex:1; }
    .add-form .btn { width:auto; padding:10px 18px; flex-shrink:0; }

    .filters { display:flex; gap:6px; margin-bottom:20px; }
    .filter-btn { background:none; border:1px solid var(--border); color:var(--muted); font-family:var(--font-mono); font-size:11px; padding:5px 14px; border-radius:99px; cursor:pointer; transition:all 0.15s; }
    .filter-btn.active { background:var(--accent); border-color:var(--accent); color:#0d0d0d; }

    .todo-list { display:flex; flex-direction:column; gap:6px; }
    .todo-item { display:flex; align-items:center; gap:14px; padding:14px 16px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); transition:border-color 0.15s,opacity 0.2s; animation:slideIn 0.2s ease both; }
    @keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
    .todo-item:hover { border-color:#3a3a3a; }
    .todo-item.done { opacity:0.45; }

    .check-wrap { flex-shrink:0; width:20px; height:20px; position:relative; cursor:pointer; }
    .check-wrap input[type="checkbox"] { opacity:0; position:absolute; width:100%; height:100%; cursor:pointer; margin:0; }
    .check-box { width:20px; height:20px; border:1.5px solid var(--border); border-radius:4px; display:flex; align-items:center; justify-content:center; transition:border-color 0.15s,background 0.15s; pointer-events:none; }
    .check-wrap:hover .check-box { border-color:var(--accent); }
    .check-wrap input:checked ~ .check-box { background:var(--accent); border-color:var(--accent); }
    .check-icon { display:none; width:10px; height:7px; }
    .check-icon path { stroke:#0d0d0d; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
    .check-wrap input:checked ~ .check-box .check-icon { display:block; }

    .todo-text { flex:1; font-size:14px; }
    .todo-item.done .todo-text { text-decoration:line-through; color:var(--muted); }
    .todo-meta { font-size:10px; color:var(--muted); flex-shrink:0; }

    .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
    .empty-state .empty-icon { font-size:36px; margin-bottom:12px; opacity:0.4; }

    .message { padding:10px 14px; border-radius:var(--radius); font-size:12px; margin-bottom:16px; display:none; }
    .message.error   { background:rgba(255,77,77,0.1);   border:1px solid rgba(255,77,77,0.3);   color:#ff8080;      display:block; }
    .message.success { background:rgba(200,240,74,0.1);  border:1px solid rgba(200,240,74,0.3);  color:var(--accent); display:block; }

    .spinner { width:16px; height:16px; border:2px solid rgba(0,0,0,0.2); border-top-color:#0d0d0d; border-radius:50%; animation:spin 0.6s linear infinite; display:inline-block; }
    @keyframes spin { to{transform:rotate(360deg)} }

    #loading-overlay { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:100; transition:opacity 0.4s; }
    #loading-overlay.hidden { opacity:0; pointer-events:none; }
    .loading-logo { font-family:var(--font-head); font-size:28px; font-weight:800; }
    .loading-logo span { color:var(--accent); }
    .loading-dot { display:inline-block; animation:blink 1s ease infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .rt-badge { display:inline-flex; align-items:center; gap:5px; font-size:10px; color:var(--muted); }
    .rt-dot { width:6px; height:6px; border-radius:50%; background:var(--muted); transition:background 0.3s; }
    .rt-dot.live { background:var(--accent); animation:pulse 2s ease infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 2px rgba(200,240,74,0.2)} 50%{box-shadow:0 0 0 5px rgba(200,240,74,0)} }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="loading-logo">do<span>able</span><span class="loading-dot">.</span></div>
</div>

<div id="app">
  <header>
    <div class="logo">do<span>able</span></div>
    <div class="header-right">
      <div class="rt-badge">
        <div class="rt-dot" id="rt-dot"></div>
        <span id="rt-label">connecting</span>
      </div>
      <span class="user-tag" id="user-email" style="display:none"></span>
      <button class="btn btn-ghost" id="logout-btn" style="display:none;width:auto">sign out</button>
    </div>
  </header>

  <main>
    <!-- AUTH -->
    <div id="auth-screen" class="screen">
      <div class="auth-header">
        <h1>Get things<br><em>done.</em></h1>
        <p>A shared to-do list for you and your friends.</p>
      </div>
      <div class="auth-card">
        <div class="tabs">
          <button class="tab-btn active" data-tab="login">Sign in</button>
          <button class="tab-btn" data-tab="signup">Create account</button>
        </div>
        <div id="auth-msg" class="message"></div>
        <div id="login-form">
          <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="you@example.com" /></div>
          <div class="form-group"><label>Password</label><input type="password" id="login-password" placeholder="••••••••" /></div>
          <button class="btn" id="login-btn">Sign in</button>
        </div>
        <div id="signup-form" style="display:none">
          <div class="form-group"><label>Email</label><input type="email" id="signup-email" placeholder="you@example.com" /></div>
          <div class="form-group"><label>Password</label><input type="password" id="signup-password" placeholder="min. 6 characters" /></div>
          <button class="btn" id="signup-btn">Create account</button>
        </div>
      </div>
    </div>

    <!-- TODOS -->
    <div id="todos-screen" class="screen">
      <div class="todos-header">
        <h2><small>your tasks</small>My To-Dos</h2>
        <div class="stats"><strong id="done-count">0</strong>done</div>
      </div>
      <div class="add-form">
        <input type="text" id="new-todo" placeholder="Add a new task…" maxlength="200" />
        <button class="btn" id="add-btn">Add</button>
      </div>
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="done">Done</button>
      </div>
      <div id="todos-msg" class="message"></div>
      <div class="todo-list" id="todo-list">
        <div class="empty-state"><div class="empty-icon">◎</div><p>Loading…</p></div>
      </div>
    </div>
  </main>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = 'https://abrtmsqhglebnvnnqsgz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_k5Q359IfraiIVDZ4AQlAvQ_2YSD4wBY';

let sb, currentUser, todos = [], activeFilter = 'all', rtChannel;

window.addEventListener('load', function() {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  sb.auth.onAuthStateChange(function(_e, session) {
    if (session && session.user) {
      currentUser = session.user;
      showTodosScreen();
    } else {
      currentUser = null;
      if (rtChannel) { sb.removeChannel(rtChannel); rtChannel = null; }
      document.getElementById('user-email').style.display = 'none';
      document.getElementById('logout-btn').style.display = 'none';
      showScreen('auth-screen');
    }
  });

  sb.auth.getSession().then(function(res) {
    var session = res.data && res.data.session;
    if (session && session.user) {
      currentUser = session.user;
      showTodosScreen();
    } else {
      showScreen('auth-screen');
    }
    hideOverlay();
  }).catch(function(e) {
    hideOverlay();
    showScreen('auth-screen');
    showMsg('auth-msg', 'Connection error: ' + e.message, 'error');
  });
});

function hideOverlay() {
  var ov = document.getElementById('loading-overlay');
  ov.classList.add('hidden');
  setTimeout(function() { if (ov.parentNode) ov.parentNode.removeChild(ov); }, 500);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function showTodosScreen() {
  document.getElementById('user-email').textContent = currentUser.email;
  document.getElementById('user-email').style.display = '';
  document.getElementById('logout-btn').style.display = '';
  showScreen('todos-screen');
  loadTodos();
  subscribeRealtime();
}

// Auth tabs
document.querySelectorAll('.tab-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    clearMsg('auth-msg');
    var isLogin = btn.dataset.tab === 'login';
    document.getElementById('login-form').style.display  = isLogin ? '' : 'none';
    document.getElementById('signup-form').style.display = isLogin ? 'none' : '';
  });
});

document.getElementById('login-btn').addEventListener('click', async function() {
  var email = document.getElementById('login-email').value.trim();
  var password = document.getElementById('login-password').value;
  if (!email || !password) { showMsg('auth-msg', 'Please fill in all fields.', 'error'); return; }
  setLoading('login-btn', true, 'Sign in');
  var res = await sb.auth.signInWithPassword({ email: email, password: password });
  setLoading('login-btn', false, 'Sign in');
  if (res.error) showMsg('auth-msg', res.error.message, 'error');
});

document.getElementById('signup-btn').addEventListener('click', async function() {
  var email = document.getElementById('signup-email').value.trim();
  var password = document.getElementById('signup-password').value;
  if (!email || !password) { showMsg('auth-msg', 'Please fill in all fields.', 'error'); return; }
  setLoading('signup-btn', true, 'Create account');
  var res = await sb.auth.signUp({ email: email, password: password });
  setLoading('signup-btn', false, 'Create account');
  if (res.error) showMsg('auth-msg', res.error.message, 'error');
  else showMsg('auth-msg', 'Check your email to confirm, then sign in!', 'success');
});

document.getElementById('logout-btn').addEventListener('click', function() { sb.auth.signOut(); });
document.getElementById('login-password').addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('login-btn').click(); });
document.getElementById('signup-password').addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('signup-btn').click(); });

// Todos
async function loadTodos() {
  var res = await sb.from('todos').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
  if (res.error) { showMsg('todos-msg', res.error.message, 'error'); return; }
  todos = res.data || [];
  renderTodos();
}

document.getElementById('add-btn').addEventListener('click', addTodo);
document.getElementById('new-todo').addEventListener('keydown', function(e) { if (e.key === 'Enter') addTodo(); });

async function addTodo() {
  var input = document.getElementById('new-todo');
  var title = input.value.trim();
  if (!title) return;
  input.value = '';
  setLoading('add-btn', true, 'Add');
  var res = await sb.from('todos').insert({ title: title, user_id: currentUser.id, is_complete: false });
  setLoading('add-btn', false, 'Add');
  if (res.error) { showMsg('todos-msg', res.error.message, 'error'); input.value = title; }
}

async function toggleTodo(id, current) {
  var res = await sb.from('todos').update({ is_complete: !current }).eq('id', id);
  if (res.error) showMsg('todos-msg', res.error.message, 'error');
}

async function deleteTodo(id) {
  var res = await sb.from('todos').delete().eq('id', id);
  if (res.error) showMsg('todos-msg', res.error.message, 'error');
}

function subscribeRealtime() {
  if (rtChannel) sb.removeChannel(rtChannel);
  setRt(false);
  rtChannel = sb.channel('todos-rt')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'todos', filter: 'user_id=eq.' + currentUser.id }, function(payload) {
      if (payload.eventType === 'INSERT')      todos.unshift(payload.new);
      else if (payload.eventType === 'UPDATE') todos = todos.map(function(t) { return t.id === payload.new.id ? payload.new : t; });
      else if (payload.eventType === 'DELETE') todos = todos.filter(function(t) { return t.id !== payload.old.id; });
      renderTodos();
    })
    .subscribe(function(status) { setRt(status === 'SUBSCRIBED'); });
}

function setRt(live) {
  document.getElementById('rt-dot').className = 'rt-dot' + (live ? ' live' : '');
  document.getElementById('rt-label').textContent = live ? 'live' : 'connecting';
}

document.querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderTodos();
  });
});

function renderTodos() {
  clearMsg('todos-msg');
  var filtered = activeFilter === 'active' ? todos.filter(function(t){return !t.is_complete;})
               : activeFilter === 'done'   ? todos.filter(function(t){return  t.is_complete;})
               : todos;
  document.getElementById('done-count').textContent = todos.filter(function(t){return t.is_complete;}).length;
  var list = document.getElementById('todo-list');
  if (filtered.length === 0) {
    var msgs = { all:'No tasks yet — add one above!', active:'All done! 🎉', done:'Nothing completed yet.' };
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">◎</div><p>' + (msgs[activeFilter]||'') + '</p></div>';
    return;
  }
  list.innerHTML = filtered.map(function(todo) {
    var d = new Date(todo.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    return '<div class="todo-item ' + (todo.is_complete ? 'done' : '') + '">'
      + '<label class="check-wrap"><input type="checkbox" ' + (todo.is_complete ? 'checked' : '') + ' onchange="toggleTodo(\'' + todo.id + '\',' + todo.is_complete + ')">'
      + '<div class="check-box"><svg class="check-icon" viewBox="0 0 10 7"><path d="M1 3.5L4 6.5L9 1"/></svg></div></label>'
      + '<span class="todo-text">' + esc(todo.title) + '</span>'
      + '<span class="todo-meta">' + d + '</span>'
      + '<button class="btn-danger" onclick="deleteTodo(\'' + todo.id + '\')">✕</button>'
      + '</div>';
  }).join('');
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showMsg(id, text, type) { var el=document.getElementById(id); el.textContent=text; el.className='message '+type; }
function clearMsg(id) { document.getElementById(id).className='message'; }
function setLoading(id, loading, label) { var btn=document.getElementById(id); btn.disabled=loading; btn.innerHTML=loading?'<span class="spinner"></span>':label; }
</script>
</body>
</html>
